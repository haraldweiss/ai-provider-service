# Apache fail-fast guard in front of the Ollama reverse-SSH tunnel.
#
# Pfad: /etc/httpd/conf.d/ollama-guard.conf
#
# Warum: OpenWebUI verbindet sich direkt zum lokalen Ollama-Tunnel
# (127.0.0.1:11434, gehalten von autossh auf dem Mac). Bricht der Tunnel
# weg (Reboot, Netz weg), hängt der Request lange — OpenWebUI persistiert
# währenddessen einen leeren Assistant-Knoten und der Chatverlauf wird
# beschädigt.
#
# Dieser vhost steht dazwischen: kurzes connect-Timeout (3s) → bei totem
# Tunnel sofort 503 zurück an OpenWebUI, statt minutenlang zu warten.
# Lange Antwort-Streams (großes Modell, viel Output) sind weiterhin OK,
# weil ProxyTimeout großzügig ist.
#
# Bindung: 10.89.0.1 ist das Gateway des podman-Netzwerks open-webui.
# Vom Container aus aufrufbar via host.containers.internal:11436.
# Nicht extern erreichbar (Apache hört nur auf der Bridge-IP).

Listen 10.89.0.1:11436

<VirtualHost 10.89.0.1:11436>
    ServerName ollama-guard.internal

    ProxyRequests Off
    ProxyPreserveHost On
    # Großzügig für lange Streams, aber connect bleibt kurz.
    ProxyTimeout 600

    # connectiontimeout=3 → wenn der Tunnel weg ist, sofort 503.
    # retry=0  → kein automatisches Re-Try, sonst hängt's wieder.
    # disablereuse=on → keine gepoolten Verbindungen, die ein
    #                   Reconnect-Lag verschleiern könnten.
    ProxyPass        / http://127.0.0.1:11434/ connectiontimeout=3 timeout=600 retry=0 disablereuse=on
    ProxyPassReverse / http://127.0.0.1:11434/

    # Eigene Logs, damit Tunnel-Aussetzer im Apache-Access-Log nachvollziehbar sind.
    ErrorLog  /var/log/httpd/ollama-guard-error.log
    CustomLog /var/log/httpd/ollama-guard-access.log combined
</VirtualHost>
