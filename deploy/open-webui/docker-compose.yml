services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    env_file:
      - .env
    environment:
      - WEBUI_URL=${WEBUI_URL}
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=false
      - DEFAULT_USER_ROLE=pending
      # OpenAI-kompatible Endpoint = LiteLLM-Proxy im selben Netz.
      # Der Key ist hier der LITELLM_MASTER_KEY, nicht der echte Anthropic/OpenAI-Key.
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - ENABLE_OPENAI_API=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    # Nicht nach außen exposen — nur Open WebUI im internen Netz spricht damit.
    # Zum Debuggen ggf. temporär: ports: ["127.0.0.1:4000:4000"]
    expose:
      - "4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  open-webui-data:
