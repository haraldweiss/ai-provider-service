# Apache Reverse-Proxy-Config für Open WebUI.
#
# Pfad: /etc/httpd/conf.d/open-webui.conf  (eigener vhost, eigene Subdomain).
#
# Voraussetzungen:
#   - mod_proxy, mod_proxy_http, mod_proxy_wstunnel, mod_rewrite, mod_ssl
#   - DNS-Eintrag chat.<domain> → VPS-IP
#   - TLS-Zertifikat via certbot:
#       certbot --apache -d chat.wolfinisoftware.de
#     (certbot ergänzt den :443-Block + Redirect automatisch).

<VirtualHost *:80>
    ServerName chat.wolfinisoftware.de

    # certbot setzt hier nach dem Lauf den HTTPS-Redirect ein.
    # Bis dahin reicht Plain-HTTP zum Testen — danach NICHT mehr ohne TLS nutzen.

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket-Upgrade (Streaming-Antworten + Live-Updates)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://127.0.0.1:3000/$1  [P,L]

    # Normaler HTTP-Traffic
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Große Uploads (RAG-Dokumente) zulassen
    LimitRequestBody 524288000

    ErrorLog  /var/log/httpd/open-webui-error.log
    CustomLog /var/log/httpd/open-webui-access.log combined
</VirtualHost>
