# LiteLLM-Proxy-Konfiguration für Open WebUI.
#
# LiteLLM übersetzt OpenAI-kompatible Requests aus Open WebUI in die
# nativen Anthropic-Formate. Open WebUI kennt nur OpenAI-Wire-Format,
# deshalb dieser Proxy.
#
# Modell-IDs entsprechen den aktuellen Anthropic-Production-Tags (Stand 2026).
# Bei neueren Modellen einfach unten ergänzen.

model_list:
  - model_name: claude-opus-4.7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4.6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4.5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  # Unbekannte Parameter aus Open WebUI nicht durchreichen (sonst HTTP 400 bei
  # Anthropic-Modellen, wenn die WebUI z.B. `frequency_penalty` mitsendet).
  drop_params: true
  telemetry: false
  request_timeout: 600
