# Apache Reverse-Proxy-Config für ai-provider-service.
#
# DEDIZIERTER VIRTUALHOST (empfohlen):
#   ServerName ai-provider-service.wolfinisoftware.de
#   ProxyPass / http://127.0.0.1:8767/ retry=0 timeout=600
#
# Siehe /etc/httpd/conf.d/ai-provider-service.wolfinisoftware.de.conf auf oracle-vm.
#
# ALTERNATIV: Pfad-basiertes Routing unter bestehendem vhost
# (z.B. bewerbungen.wolfinisoftware.de/ai-provider/):
#
#   ProxyPass        /ai-provider/ http://127.0.0.1:8767/
#   ProxyPassReverse /ai-provider/ http://127.0.0.1:8767/
#
# Voraussetzung: mod_proxy + mod_proxy_http aktiv.
#
# Beispiel: GET https://ai-provider-service.wolfinisoftware.de/health
#          → GET http://127.0.0.1:8767/health

ProxyPreserveHost On
ProxyRequests Off

ProxyPass        /ai-provider/ http://127.0.0.1:8767/
ProxyPassReverse /ai-provider/ http://127.0.0.1:8767/

# CORS-Header werden vom Service selbst gesetzt (Flask-CORS).
# Falls Apache zusätzliche Header strippt, hier explizit weiterreichen:
<Location /ai-provider/>
    Header set X-Forwarded-Path "/ai-provider"
</Location>
