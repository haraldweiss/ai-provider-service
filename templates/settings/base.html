<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI provider settings</title>
<style>
body{font:15px/1.45 system-ui,sans-serif;max-width:820px;margin:2rem auto;padding:0 1rem;color:#222}
.card{border:1px solid #ddd;border-radius:8px;padding:1rem;margin:1rem 0}.ok{color:#176b2c}.error{color:#a00018}.muted{color:#666}
input{padding:.45rem;width:min(32rem,90%)}button{padding:.45rem .7rem;margin:.25rem}.actions{display:flex;gap:.4rem;flex-wrap:wrap}
</style></head><body>
<header><h1>Personal AI provider keys</h1>{% if session.get('settings_user_id') %}<p class="muted">User: {{ session.settings_user_id }}</p>{% endif %}</header>
{% for category, message in get_flashed_messages(with_categories=true) %}<p class="{{ category }}">{{ message }}</p>{% endfor %}
{% block content %}{% endblock %}
</body></html>
